<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bilibili 屏蔽控制面板</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 12px; margin: 0; background-color: #f9f9f9; width: 220px; }
    h3 { margin: 0 0 10px; font-size: 16px; font-weight: 600; }
    .toggle-group { display: flex; flex-direction: column; gap: 6px; }
    label { display: flex; align-items: center; font-size: 14px; white-space: nowrap; }
    input[type="checkbox"] { margin-right: 8px; }
  </style>
</head>
<body>
  <h3>功能开关</h3>
  <div class="toggle-group">
    <label><input type="checkbox" id="toggleRedirect"> 全局专注重定向</label>
    <label><input type="checkbox" id="togglePlayer"> 播放页遮罩</label>
    <label><input type="checkbox" id="toggleSearch"> 搜索页屏蔽历史热搜</label>
  </div>
  <script src="controlPanel.js"></script>
</body>
</html>
